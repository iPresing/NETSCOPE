# NETSCOPE - Manifest des sources de blacklists par défaut
# Story 4b.9 — Enrichissement Blacklists Sources
#
# Ce fichier est consommé par le script CLI `refresh_blacklists.py` pour
# rafraîchir les fichiers .txt à partir de sources publiques. Il ne doit PAS
# être lu par l'application Flask au runtime.
#
# Format :
#   sources:
#     - name: <identifiant unique>
#       url: <URL HTTPS du feed>
#       parser: <plain_text_ip | plain_text_domain | urlhaus_csv>
#       target: <nom du fichier .txt cible dans ce dossier>
#       max_entries: <int, limite d'extraction pour maîtriser la taille>
#       license: <SPDX ou libellé court>

sources:
  # IPs malware --------------------------------------------------------------
  - name: ipsum_level4
    url: https://raw.githubusercontent.com/stamparm/ipsum/master/levels/4.txt
    parser: plain_text_ip
    target: ips_malware.txt
    max_entries: 100
    license: Unlicense

  - name: firehol_level1
    url: https://iplists.firehol.org/files/firehol_level1.netset
    parser: plain_text_ip
    target: ips_malware.txt
    max_entries: 50
    license: CC-BY-SA-4.0

  # IPs C2 -------------------------------------------------------------------
  - name: feodo_tracker
    url: https://feodotracker.abuse.ch/downloads/ipblocklist.txt
    parser: plain_text_ip
    target: ips_c2.txt
    max_entries: 200
    license: CC0-1.0

  # Domaines malware ---------------------------------------------------------
  - name: hagezi_malware
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/pro.mini.txt
    parser: plain_text_domain
    target: domains_malware.txt
    max_entries: 150
    license: GPL-3.0

  - name: urlhaus_domains
    url: https://urlhaus.abuse.ch/downloads/hostfile/
    parser: plain_text_domain
    target: domains_malware.txt
    max_entries: 100
    license: CC0-1.0

  # Domaines phishing --------------------------------------------------------
  - name: phishing_army
    url: https://phishing.army/download/phishing_army_blocklist.txt
    parser: plain_text_domain
    target: domains_phishing.txt
    max_entries: 200
    license: CC0-1.0

  - name: hagezi_phishing
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/tif.mini.txt
    parser: plain_text_domain
    target: domains_phishing.txt
    max_entries: 100
    license: GPL-3.0
