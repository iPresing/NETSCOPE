{% extends 'base.html' %}

{% block title %}Inspection de Paquets - NETSCOPE{% endblock %}

{% block content %}
<div class="jobs-container">
    <section class="page-header">
        <h2>Inspection de Paquets</h2>
        <p class="text-muted">Explorer les paquets capturés avec des filtres</p>
    </section>

    <section class="jobs-actions card">
        <h3>Filtres d'Inspection</h3>
        <div class="form-row">
            <div class="form-group">
                <label for="job-target-ip">Cible IP:</label>
                <input type="text" id="job-target-ip" class="form-control" placeholder="192.168.1.x">
            </div>
            <div class="form-group">
                <label for="job-target-port">Port (optionnel):</label>
                <input type="number" id="job-target-port" class="form-control" placeholder="443" min="1" max="65535">
            </div>
            <div class="form-group">
                <label for="job-port-direction">Direction du port:</label>
                <select id="job-port-direction" class="form-control" disabled>
                    <option value="both">Source & Destination (both)</option>
                    <option value="dst">Destination uniquement (dst)</option>
                    <option value="src">Source uniquement (src)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="job-protocol">Protocole:</label>
                <select id="job-protocol" class="form-control">
                    <option value="">Tous</option>
                    <option value="TCP">TCP</option>
                    <option value="UDP">UDP</option>
                    <option value="ICMP">ICMP</option>
                </select>
            </div>
            <button class="btn btn-primary" id="btn-inspect-packets">
                Voir les Paquets
            </button>
        </div>
    </section>

    <section class="jobs-history card">
        <h3>Historique des Jobs</h3>
        <div id="jobs-history-list">
            <p class="text-muted text-center">Aucun job execute</p>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/jobs.js') }}"></script>
{% endblock %}
